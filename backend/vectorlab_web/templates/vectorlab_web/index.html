<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vector Lab Host</title>
    <style>
      body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f3f6fb;
        color: #132235;
      }
      main {
        max-width: 840px;
        margin: 3rem auto;
        padding: 0 1rem;
      }
      .card {
        background: #fff;
        border: 1px solid #d6dee8;
        border-radius: 12px;
        padding: 1rem 1.2rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Vector Lab Django Host</h1>
      <div class="card">
        <p>This is the thin backend shell.</p>
        <p>
          Frontend development runs with Vite. In production, Django will serve built
          frontend assets from <code>frontend/dist</code>.
        </p>
      </div>
    </main>
  </body>
</html>
